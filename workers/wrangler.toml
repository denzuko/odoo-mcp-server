# workers/wrangler.toml
name               = "odoo-mcp-server"
main               = "worker.js"
compatibility_date = "2025-03-01"

# .wasm files imported as WebAssembly modules (static ES import)
[[rules]]
type        = "CompiledWasm"
globs       = ["**/*.wasm"]
fallthrough = false

[vars]
NET_MATRIX_APPLICATION = "odoo-mcp-server"
NET_MATRIX_ORGUNIT     = "Matrix NOC"
NET_MATRIX_COSTCENTER  = "INT-01"
