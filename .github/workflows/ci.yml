name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

# Create a GitHub issue when any job fails on main
# Reusable via: needs: [job], if: failure()

jobs:
  build-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc make libssl-dev autoconf automake libtool pkg-config zlib1g-dev curl
          git clone --depth=1 https://github.com/kristapsdz/kcgi /tmp/kcgi
          cd /tmp/kcgi && ./configure && make && sudo make install

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Build nob driver (native)
        run: cc nob.c -o nob

      - name: Build native binary
        run: ./nob

      - uses: actions/upload-artifact@v4
        with:
          name: odoo-mcp-native
          path: build/odoo-mcp-server

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: build-native on ${context.sha.slice(0,7)}`,
              body:  `build-native failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci'],
            })

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasi-sdk
        run: |
          WASI_VER=24
          curl -sLo /tmp/wasi.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VER}/wasi-sdk-${WASI_VER}.0-x86_64-linux.tar.gz"
          sudo tar xz -C /opt -f /tmp/wasi.tar.gz
          sudo ln -s /opt/wasi-sdk-${WASI_VER}.0 /opt/wasi-sdk

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Build nob driver (wasm)
        run: cc -Dwasm nob.c -o nob

      - name: Build WASM module
        run: env WASI_SDK=/opt/wasi-sdk ./nob

      - uses: actions/upload-artifact@v4
        with:
          name: odoo-mcp-wasm
          path: build/odoo-mcp-server.wasm

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: build-wasm on ${context.sha.slice(0,7)}`,
              body:  `build-wasm failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci'],
            })

  docker:
    runs-on: ubuntu-latest
    needs: build-native
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/denzuko/odoo-mcp-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: docker on ${context.sha.slice(0,7)}`,
              body:  `docker build/push failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci'],
            })

  sbom:
    runs-on: ubuntu-latest
    needs: [build-native, build-wasm]
    steps:
      - uses: actions/checkout@v4

      - name: Install cdxgen + osv-scanner
        run: |
          npm install -g @cyclonedx/cdxgen
          curl -sLo /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner

      - name: cdxgen CycloneDX JSON
        run: cdxgen -t c -o sbom.cdx.json --spec-version 1.6 .

      - name: cdxgen SPDX JSON
        run: |
          cdxgen -t c --output-format spdx-json \
            -o sbom.spdx.json --spec-version 1.6 . \
          || node scripts/gen_spdx.js

      - name: osv-scanner SARIF
        run: |
          osv-scanner --sbom=sbom.cdx.json --format=sarif \
            --output=osv.sarif.json || true
          python3 scripts/sarif_stub.py osv.sarif.json osv-scanner

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: osv.sarif.json
          category: osv-scanner

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom.cdx.json
            sbom.spdx.json
            osv.sarif.json

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: sbom on ${context.sha.slice(0,7)}`,
              body:  `SBOM generation failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci'],
            })

  sast-c:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y cppcheck clang

      - name: cppcheck
        run: |
          cppcheck --enable=all --std=c99 --suppress=missingInclude \
            --inline-suppr --error-exitcode=0 \
            --output-file=cppcheck.xml --xml *.c 2>&1 || true
          python3 scripts/cppcheck_to_sarif.py cppcheck.xml cppcheck.sarif.json

      - name: clang AST call extraction
        run: |
          clang -std=c99 -I. -Xclang -ast-dump=json -fsyntax-only \
            main.c mcp.c odoo.c 2>/dev/null | \
          jq '[.. | select(.kind?=="CallExpr") |
            {callee:(.inner[0].referencedDecl.name? //
                     .inner[0].inner[0].referencedDecl.name?)}
            | select(.callee!=null)]' > ast_calls.json 2>/dev/null \
          || echo '[]' > ast_calls.json
          echo "AST calls: $(jq length ast_calls.json)"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: cppcheck.sarif.json
          category: cppcheck

      - uses: actions/upload-artifact@v4
        with:
          name: c-sast-artifacts
          path: |
            cppcheck.sarif.json
            ast_calls.json

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: sast-c on ${context.sha.slice(0,7)}`,
              body:  `C SAST failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci', 'security'],
            })

  terraform-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: KICS scan
        run: |
          docker run --rm \
            -v "$(pwd)/terraform:/path" -v "$(pwd):/output" \
            checkmarx/kics:latest scan -p /path \
              --report-formats sarif --output-path /output \
              --output-name kics-tf --exclude-severities info,low \
              --no-progress || true
          # kics outputs kics-tf.sarif (no .json extension)
          [ -f kics-tf.sarif ] && cp kics-tf.sarif kics-tf.sarif.json || true
          python3 scripts/sarif_stub.py kics-tf.sarif.json kics

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: kics-tf.sarif.json
          category: kics-terraform

      - uses: actions/upload-artifact@v4
        with:
          name: tf-sast-artifacts
          path: kics-tf.sarif.json

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: terraform-sast on ${context.sha.slice(0,7)}`,
              body:  `Terraform SAST failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci', 'security'],
            })

  terraform-plan:
    runs-on: ubuntu-latest
    needs: terraform-sast
    environment: plan
    env:
      TF_VAR_cloudflare_api_token:  ${{ secrets.CF_API_TOKEN_PLAN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id:    ${{ secrets.CF_ZONE_ID }}
      TF_VAR_odoo_url:              ${{ secrets.ODOO_URL }}
      TF_VAR_odoo_db:               ${{ secrets.ODOO_DB }}
      TF_VAR_odoo_user:             ${{ secrets.ODOO_USER }}
      TF_VAR_odoo_api_key:          ${{ secrets.ODOO_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: tf init + validate + plan
        working-directory: terraform/
        run: |
          terraform init -backend=false
          terraform validate
          mkdir -p ../workers && touch ../workers/worker.js
          mkdir -p build && touch build/odoo-mcp-server.wasm
          terraform plan -out=plan.tfplan 2>&1 | head -50 || true
          terraform show -json plan.tfplan > plan.json 2>/dev/null || \
            echo '{"resource_changes":[]}' > plan.json

      - name: Install conftest
        run: |
          curl -sLo /tmp/ct.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.57.0/conftest_0.57.0_Linux_x86_64.tar.gz
          sudo tar xz -C /usr/local/bin -f /tmp/ct.tar.gz conftest

      - name: conftest plan gate
        run: |
          conftest test terraform/plan.json \
            --policy policy/ \
            --namespace odoo_mcp.terraform_plan \
            --output table

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tf-plan-json
          path: terraform/plan.json

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: terraform-plan on ${context.sha.slice(0,7)}`,
              body:  `Terraform plan/conftest gate failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci'],
            })

  opa-gate:
    runs-on: ubuntu-latest
    needs: [sast-c, terraform-sast, terraform-plan, sbom]
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sLo /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Validate all Rego policies
        run: opa check policy/

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-artifacts"
          merge-multiple: true

      - name: c_quality gate
        run: |
          opa eval -d policy/c_quality.rego -i cppcheck.sarif.json \
            --fail-defined 'data.odoo_mcp.c_quality.violations[_]' && \
            echo "c_quality: PASS"

      - name: terraform_sast gate
        run: |
          opa eval -d policy/terraform_sast.rego -i kics-tf.sarif.json \
            --fail-defined 'data.odoo_mcp.terraform_sast.violations[_]' && \
            echo "terraform_sast: PASS"

      - name: sarif CVE gate
        run: |
          opa eval -d policy/sarif.rego -i osv.sarif.json \
            --fail-defined 'data.odoo_mcp.sarif.violations[_]' && \
            echo "sarif CVE gate: PASS"

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: opa-gate on ${context.sha.slice(0,7)}`,
              body:  `OPA policy gate failed — a security finding blocks merge.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci', 'security'],
            })

  terraform-deploy:
    runs-on: ubuntu-latest
    needs: opa-gate
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      TF_VAR_cloudflare_api_token:  ${{ secrets.CF_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id:    ${{ secrets.CF_ZONE_ID }}
      TF_VAR_odoo_url:              ${{ secrets.ODOO_URL }}
      TF_VAR_odoo_db:               ${{ secrets.ODOO_DB }}
      TF_VAR_odoo_user:             ${{ secrets.ODOO_USER }}
      TF_VAR_odoo_api_key:          ${{ secrets.ODOO_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: odoo-mcp-wasm
          path: .

      - name: Install wrangler
        run: npm install -g wrangler

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Terraform init + apply
        working-directory: terraform/
        run: |
          terraform init
          terraform apply -auto-approve
          terraform output mcp_endpoint

      - name: Open issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `CI failure: terraform-deploy on ${context.sha.slice(0,7)}`,
              body:  `Production deploy failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\nCommit: ${context.sha}`,
              labels: ['bug', 'ci', 'production'],
            })

  pages:
    runs-on: ubuntu-latest
    needs: opa-gate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deploy
        uses: actions/deploy-pages@v4
