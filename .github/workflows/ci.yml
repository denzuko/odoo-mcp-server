name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Build: native ELF ──────────────────────────────────────────────────
  build-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang gcc make libssl-dev libtls-dev \
            libkcgi-dev || true
          # kcgi not in apt — build from source if missing
          if ! pkg-config --exists kcgi 2>/dev/null; then
            git clone --depth=1 https://github.com/kristapsdz/kcgi /tmp/kcgi
            cd /tmp/kcgi && ./configure && make && sudo make install
          fi

      - name: Vendor nob.h
        run: |
          curl -sLo nob.h \
            https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Build native
        run: cc -o nob nob.c && ./nob

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: odoo-mcp-native
          path: odoo-mcp

  # ── Build: WASM ────────────────────────────────────────────────────────
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasi-sdk
        run: |
          WASI_VER=24
          curl -sLo /tmp/wasi-sdk.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VER}/wasi-sdk-${WASI_VER}.0-x86_64-linux.tar.gz"
          sudo tar xz -C /opt -f /tmp/wasi-sdk.tar.gz
          sudo ln -s /opt/wasi-sdk-${WASI_VER}.0 /opt/wasi-sdk

      - name: Vendor nob.h
        run: |
          curl -sLo nob.h \
            https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Build WASM
        run: |
          cc -o nob nob.c
          WASI_SDK=/opt/wasi-sdk ./nob wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: odoo-mcp-wasm
          path: odoo-mcp.wasm

  # ── SAST: cppcheck (AST-level) ─────────────────────────────────────────
  sast-cppcheck:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --std=c99 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            --error-exitcode=0 \
            --output-file=cppcheck-report.xml \
            --xml \
            *.c 2>&1 || true

          # Convert cppcheck XML to SARIF
          pip install cppcheck-sarif --quiet 2>/dev/null || \
            python3 -c "
import xml.etree.ElementTree as ET, json, sys
tree = ET.parse('cppcheck-report.xml')
runs = []
results = []
for err in tree.findall('.//error'):
    loc = err.find('location')
    results.append({
        'ruleId': err.get('id','unknown'),
        'level': 'error' if err.get('severity') in ('error','warning') else 'note',
        'message': {'text': err.get('msg','')},
        'locations': [{'physicalLocation': {
            'artifactLocation': {'uri': loc.get('file','') if loc is not None else ''},
            'region': {'startLine': int(loc.get('line',1)) if loc is not None else 1}
        }}]
    })
sarif = {'version':'2.1.0','runs':[{'tool':{'driver':{'name':'cppcheck','rules':[]}},'results':results}]}
json.dump(sarif, open('cppcheck.sarif.json','w'), indent=2)
print(f'cppcheck: {len(results)} findings')
"

      - name: Upload cppcheck SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: cppcheck.sarif.json
          category: cppcheck

      - name: Upload SARIF artifact for OPA gate
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-sarif
          path: cppcheck.sarif.json

  # ── SAST: clang-tidy (AST-backed) ─────────────────────────────────────
  sast-clang-tidy:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Install clang tools
        run: |
          sudo apt-get install -y clang clang-tidy

      - name: Generate compile_commands.json
        run: |
          # Use bear or compile_commands manual generation
          cat > compile_commands.json << 'EOF'
          [
            { "directory": "${{ github.workspace }}",
              "command": "clang -std=c99 -I. -c main.c",
              "file": "main.c" },
            { "directory": "${{ github.workspace }}",
              "command": "clang -std=c99 -I. -c mcp.c",
              "file": "mcp.c" },
            { "directory": "${{ github.workspace }}",
              "command": "clang -std=c99 -I. -c odoo.c",
              "file": "odoo.c" },
            { "directory": "${{ github.workspace }}",
              "command": "clang -std=c99 -I. -c net.c",
              "file": "net.c" }
          ]
          EOF

      - name: Run clang-tidy
        run: |
          clang-tidy \
            --checks='-*,clang-analyzer-*,cert-*,readability-*' \
            --export-fixes=clang-tidy-fixes.yaml \
            -p compile_commands.json \
            *.c -- -std=c99 -I. 2>&1 | \
          python3 -c "
import sys, re, json
results = []
for line in sys.stdin:
    m = re.match(r'(.+):(\d+):\d+: (error|warning|note): (.+) \[(.+)\]', line)
    if m:
        results.append({
            'ruleId': m.group(5),
            'level': 'error' if m.group(3) == 'error' else 'warning',
            'message': {'text': m.group(4)},
            'locations': [{'physicalLocation': {
                'artifactLocation': {'uri': m.group(1)},
                'region': {'startLine': int(m.group(2))}
            }}]
        })
sarif = {'version':'2.1.0','runs':[{'tool':{'driver':{'name':'clang-tidy','rules':[]}},'results':results}]}
json.dump(sarif, open('clang-tidy.sarif.json','w'), indent=2)
print(f'clang-tidy: {len(results)} findings')
" || echo '{"version":"2.1.0","runs":[]}' > clang-tidy.sarif.json

      - name: Upload clang-tidy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: clang-tidy.sarif.json
          category: clang-tidy

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-sarif
          path: clang-tidy.sarif.json

  # ── CycloneDX SBOM ─────────────────────────────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Generate CycloneDX SBOM (C/system deps)
        run: |
          pip install cyclonedx-bom --quiet
          # For C projects we enumerate deps from nob.c comments
          python3 - << 'EOF'
import json, datetime
sbom = {
  "bomFormat": "CycloneDX",
  "specVersion": "1.6",
  "version": 1,
  "metadata": {
    "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
    "component": {
      "type": "application",
      "name": "odoo-mcp-server",
      "version": "1.0.0",
      "language": "C99"
    }
  },
  "components": [
    {"type":"library","name":"kcgi",    "version":"0.14.x","licenses":[{"license":{"id":"ISC"}}]},
    {"type":"library","name":"libtls",  "version":"3.x",   "licenses":[{"license":{"id":"ISC"}}]},
    {"type":"library","name":"nob.h",   "version":"3.8.2",  "licenses":[{"license":{"id":"Unlicense"}}]},
    {"type":"library","name":"opa",     "version":"latest", "licenses":[{"license":{"id":"Apache-2.0"}}]}
  ]
}
json.dump(sbom, open('sbom.json','w'), indent=2)
print("SBOM generated: sbom.json")
EOF

      - name: Scan SBOM with osv-scanner
        uses: google/osv-scanner-action@v2
        with:
          scan-args: |-
            --sbom=sbom.json
            --format=sarif
            --output=osv.sarif.json
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.json

  # ── OPA quality gate ───────────────────────────────────────────────────
  opa-gate:
    runs-on: ubuntu-latest
    needs: [sast-cppcheck, sast-clang-tidy, sbom]
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sLo /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Validate Rego syntax
        run: opa check policy/

      - name: Download SAST artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-sarif"
          merge-multiple: true

      - name: Merge SARIF files
        run: |
          python3 - << 'EOF'
import json, glob, sys
merged = {"version": "2.1.0", "runs": []}
for f in glob.glob("*.sarif.json"):
    try:
        d = json.load(open(f))
        merged["runs"].extend(d.get("runs", []))
        print(f"merged: {f}")
    except Exception as e:
        print(f"skip {f}: {e}")
json.dump(merged, open("merged.sarif.json","w"), indent=2)
total = sum(len(r.get("results",[])) for r in merged["runs"])
print(f"Total findings: {total}")
EOF

      - name: OPA c_quality gate
        run: |
          opa eval \
            -d policy/c_quality.rego \
            -i merged.sarif.json \
            --fail-defined 'data.odoo_mcp.c_quality.violations[_]' && \
          echo "OPA c_quality gate: PASS"

      - name: OPA sarif gate (CVE threshold)
        run: |
          [ -f osv.sarif.json ] || echo '{"version":"2.1.0","runs":[]}' > osv.sarif.json
          opa eval \
            -d policy/sarif.rego \
            -i osv.sarif.json \
            --fail-defined 'data.odoo_mcp.sarif.violations[_]' && \
          echo "OPA sarif gate: PASS"

  # ── GitHub Pages ────────────────────────────────────────────────────────
  pages:
    runs-on: ubuntu-latest
    needs: opa-gate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deploy
        uses: actions/deploy-pages@v4
