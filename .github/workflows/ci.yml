name: CI

# Pipeline phases:
#   1. build      — compile native ELF + WASM module
#   2. gate       — SBOM, SAST, OPA policy checks (shift-left)
#   3. publish    — sign artefacts, create GitHub Release, push container image
#
# Deployment is SEPARATE — Terraform/quadlets/rc.d pull from signed locations:
#   CF Workers  ← Terraform downloads .wasm from GitHub Release
#   Preprod     ← Quadlet pulls image from GHCR (tagged by release)
#   Prod        ← FreeBSD/NetBSD rc.d downloads ELF from GitHub Release

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents:        read
  issues:          write
  security-events: write   # github/codeql-action/upload-sarif

jobs:
  # ── Phase 1: Build ──────────────────────────────────────────────────────
  build-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc bmake libtls-dev curl
          git clone --depth=1 https://github.com/kristapsdz/kcgi /tmp/kcgi
          cd /tmp/kcgi && ./configure && bmake && sudo bmake install

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Bootstrap nob (native)
        run: cc nob.c -o nob

      - name: Build
        run: ./nob

      - uses: actions/upload-artifact@v4
        with:
          name: odoo-mcp-native
          path: build/odoo-mcp-server


  test:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gcc libtls-dev

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Build nob driver
        run: gcc -std=c99 -D_POSIX_C_SOURCE=200809L -o nob nob.c

      - name: Run xUnit tests
        run: ./nob test


  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasi-sdk
        run: |
          WASI_VER=25
          curl -sLo /tmp/wasi.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VER}/wasi-sdk-${WASI_VER}.0-x86_64-linux.tar.gz"
          sudo tar xz -C /opt -f /tmp/wasi.tar.gz
          sudo ln -s /opt/wasi-sdk-${WASI_VER}.0-x86_64-linux /opt/wasi-sdk

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Bootstrap nob (wasm)
        run: cc -Dwasm nob.c -o nob

      - name: Build
        run: env WASI_SDK=/opt/wasi-sdk ./nob

      - uses: actions/upload-artifact@v4
        with:
          name: odoo-mcp-wasm
          path: build/odoo-mcp-server.wasm

  sbom:
    runs-on: ubuntu-latest
    needs: [build-native, build-wasm]
    steps:
      - uses: actions/checkout@v4

      - name: Install cdxgen + osv-scanner
        run: |
          npm install -g @cyclonedx/cdxgen
          curl -sLo /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner

      - name: cdxgen CycloneDX
        run: cdxgen -t c -o sbom.cdx.json --spec-version 1.6 .

      - name: cdxgen SPDX
        run: |
          cdxgen -t c --output-format spdx-json \
            -o sbom.spdx.json --spec-version 1.6 . \
          || node scripts/gen_spdx.js

      - name: osv-scanner SARIF
        run: |
          osv-scanner --sbom=sbom.cdx.json --format=sarif \
            --output=osv.sarif.json || true
          sh scripts/sarif_stub.sh osv.sarif.json osv-scanner

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: osv.sarif.json
          category: osv-scanner

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom.cdx.json
            sbom.spdx.json
            osv.sarif.json


  sast-c:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y cppcheck clang

      - name: cppcheck SARIF
        run: |
          cppcheck --enable=all --std=c99 --suppress=missingInclude \
            --inline-suppr --error-exitcode=0 \
            --output-file=cppcheck.xml --xml *.c 2>&1 || true
          sh scripts/cppcheck_to_sarif.sh cppcheck.xml cppcheck.sarif.json

      - name: clang AST call extraction
        run: |
          clang -std=c99 -I. -Xclang -ast-dump=json -fsyntax-only \
            main.c mcp.c odoo.c 2>/dev/null | \
          jq '[.. | select(.kind?=="CallExpr") |
            {callee:(.inner[0].referencedDecl.name? //
                     .inner[0].inner[0].referencedDecl.name?)}
            | select(.callee!=null)]' > ast_calls.json 2>/dev/null \
          || echo '[]' > ast_calls.json

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: cppcheck.sarif.json
          category: cppcheck

      - uses: actions/upload-artifact@v4
        with:
          name: c-sast-artifacts
          path: |
            cppcheck.sarif.json
            ast_calls.json


  containers-gate:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sLo /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Generate containers check JSON
        run: sh scripts/check_containers.sh > containers_check.json

      - name: OPA containers gate
        run: |
          opa eval -d policy/containers.rego -i containers_check.json \
            --fail-defined 'data.odoo_mcp.containers.violations[_]' && \
            echo "containers gate: PASS"


  terraform-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: KICS scan SARIF
        run: |
          docker run --rm \
            -v "$(pwd)/terraform:/path" -v "$(pwd):/output" \
            checkmarx/kics:latest scan -p /path \
              --report-formats sarif --output-path /output \
              --output-name kics-tf --exclude-severities info,low \
              --no-progress || true
          [ -f kics-tf.sarif ] && cp kics-tf.sarif kics-tf.sarif.json || true
          sh scripts/sarif_stub.sh kics-tf.sarif.json kics

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: kics-tf.sarif.json
          category: kics-terraform

      - name: tfsec SARIF
        run: |
          docker run --rm \
            -v "$(pwd)/terraform:/src" \
            aquasec/tfsec:latest /src \
              --format sarif --out /src/tfsec.sarif.json || true
          [ -f terraform/tfsec.sarif.json ] && \
            cp terraform/tfsec.sarif.json tfsec.sarif.json || true
          sh scripts/sarif_stub.sh tfsec.sarif.json tfsec

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: tfsec.sarif.json
          category: tfsec

      - name: infracost breakdown
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          if [ -n "$INFRACOST_API_KEY" ]; then
            curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh \
              | sh -s -- --no-sudo
            infracost breakdown \
              --path terraform/ \
              --format json \
              --out-file infracost.json \
              --terraform-var "cloudflare_api_token=placeholder" \
              --terraform-var "cloudflare_account_id=placeholder" \
              --terraform-var "cloudflare_zone_id=placeholder" \
              --terraform-var "odoo_url=placeholder" \
              --terraform-var "odoo_db=placeholder" \
              --terraform-var "odoo_user=placeholder" \
              --terraform-var "odoo_api_key=placeholder" \
              --terraform-var "release_tag=v0.0.0" || true
          else
            echo '{"projects":[{"breakdown":{"totalMonthlyCost":"0","resources":[]}}]}' \
              > infracost.json
            echo "INFRACOST_API_KEY not set — skipping cost estimate"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: tf-sast-artifacts
          path: |
            kics-tf.sarif.json
            tfsec.sarif.json
            infracost.json


  terraform-plan:
    runs-on: ubuntu-latest
    needs: terraform-sast
    environment: plan
    env:
      TF_VAR_cloudflare_api_token:  ${{ secrets.CF_API_TOKEN_PLAN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id:    ${{ secrets.CF_ZONE_ID }}
      TF_VAR_odoo_url:              ${{ secrets.ODOO_URL }}
      TF_VAR_odoo_db:               ${{ secrets.ODOO_DB }}
      TF_VAR_odoo_user:             ${{ secrets.ODOO_USER }}
      TF_VAR_odoo_api_key:          ${{ secrets.ODOO_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.x"

      - name: tf init + validate + plan
        working-directory: terraform/
        run: |
          TF_CLI_ARGS_init="-backend=false" terraform init
          terraform validate
          # Stub assets so plan can run without real build outputs
          mkdir -p ../workers && touch ../workers/worker.js
          mkdir -p ../build  && touch ../build/odoo-mcp-server.wasm
          terraform plan -out=plan.tfplan 2>&1 | head -50 || true
          terraform show -json plan.tfplan > plan.json 2>/dev/null || \
            echo '{"resource_changes":[]}' > plan.json

      - name: Install conftest
        run: |
          curl -sLo /tmp/ct.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.57.0/conftest_0.57.0_Linux_x86_64.tar.gz
          sudo tar xz -C /usr/local/bin -f /tmp/ct.tar.gz conftest

      - name: conftest plan gate
        run: |
          conftest test terraform/plan.json \
            --policy policy/ \
            --namespace odoo_mcp.terraform_plan \
            --output table

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tf-plan-json
          path: terraform/plan.json


  opa-gate:
    runs-on: ubuntu-latest
    needs: [test, sast-c, containers-gate, terraform-sast, terraform-plan, sbom]
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sLo /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Validate all Rego policies
        run: opa check policy/

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-artifacts"
          merge-multiple: true

      - name: c_quality gate
        run: |
          opa eval -d policy/c_quality.rego -i cppcheck.sarif.json \
            --fail-defined 'data.odoo_mcp.c_quality.violations[_]' && \
            echo "c_quality: PASS"

      - name: code_conventions gate
        run: |
          opa eval -d policy/code_conventions.rego -i ast_calls.json \
            --fail-defined 'data.odoo_mcp.code_conventions.violations[_]' && \
            echo "code_conventions: PASS"

      - name: terraform_sast gate
        run: |
          opa eval -d policy/terraform_sast.rego -i kics-tf.sarif.json \
            --fail-defined 'data.odoo_mcp.terraform_sast.violations[_]' && \
            echo "terraform_sast: PASS"

      - name: tfsec gate
        run: |
          opa eval -d policy/tfsec.rego -i tfsec.sarif.json \
            --fail-defined 'data.odoo_mcp.tfsec.violations[_]' && \
            echo "tfsec: PASS"

      - name: infracost gate
        run: |
          opa eval -d policy/infracost.rego -i infracost.json \
            --fail-defined 'data.odoo_mcp.infracost.violations[_]' && \
            echo "infracost: PASS"

      - name: sarif CVE gate
        run: |
          opa eval -d policy/sarif.rego -i osv.sarif.json \
            --fail-defined 'data.odoo_mcp.sarif.violations[_]' && \
            echo "sarif CVE gate: PASS"


  publish:
    runs-on: ubuntu-latest
    needs: opa-gate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write      # create GitHub Release
      id-token: write      # cosign keyless signing
      packages: write      # push to GHCR
    outputs:
      release_url: ${{ steps.release.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: odoo-mcp-native
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: odoo-mcp-wasm
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sbom-artifacts
          path: dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artefacts
        run: |
          cosign sign-blob --yes \
            --bundle dist/odoo-mcp-server.bundle \
            dist/odoo-mcp-server
          cosign sign-blob --yes \
            --bundle dist/odoo-mcp-server.wasm.bundle \
            dist/odoo-mcp-server.wasm

      - name: Generate checksums
        run: |
          cd dist
          sha256sum odoo-mcp-server odoo-mcp-server.wasm \
            sbom.cdx.json sbom.spdx.json > SHA256SUMS

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/odoo-mcp-server
            dist/odoo-mcp-server.bundle
            dist/odoo-mcp-server.wasm
            dist/odoo-mcp-server.wasm.bundle
            dist/sbom.cdx.json
            dist/sbom.spdx.json
            dist/SHA256SUMS

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/denzuko/odoo-mcp-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        id: image-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELEASE_TAG=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/denzuko/odoo-mcp-server@${{ steps.image-push.outputs.digest }}

  terraform-deploy:
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_cloudflare_api_token:  ${{ secrets.CF_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id:    ${{ secrets.CF_ZONE_ID }}
      TF_VAR_odoo_url:              ${{ secrets.ODOO_URL }}
      TF_VAR_odoo_db:               ${{ secrets.ODOO_DB }}
      TF_VAR_odoo_user:             ${{ secrets.ODOO_USER }}
      TF_VAR_odoo_api_key:          ${{ secrets.ODOO_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.x"

      - name: Install wrangler + cdxgen
        run: npm install -g wrangler @cyclonedx/cdxgen

      - name: Terraform init + apply
        working-directory: terraform/
        run: |
          terraform init
          terraform apply -auto-approve
          terraform output mcp_endpoint

      - name: Download WASM from release
        run: |
          curl -sLo workers/odoo-mcp.wasm \
            "https://github.com/denzuko/odoo-mcp-server/releases/download/${{ github.ref_name }}/odoo-mcp-server.wasm"

      - name: Wrangler deploy
        working-directory: workers/
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: wrangler deploy --name odoo-mcp-server

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-sbom
          path: terraform/terraform.cdx.json

  pages:
    runs-on: ubuntu-latest
    needs: opa-gate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deploy
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: [publish]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: jayqi/failed-build-issue-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          label-name: "ci"
