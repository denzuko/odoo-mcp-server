# examples/haproxy-odoo-mcp.cfg
# HAProxy frontend/backend stanza for odoo-mcp-server native deployment.
# Append to your existing haproxy.cfg.
#
# Assumes:
#   - TLS termination already handled by existing HTTPS frontend
#   - odoo-mcp-server running on 127.0.0.1:8000 (via quadlet)
#   - Custom domain: mcp.dapla.net

# ── Add to your existing HTTPS frontend (port 443) ───────────────────────
#
# frontend https_in
#     ...existing config...
#     acl host_mcp  hdr(host) -i mcp.dapla.net
#     use_backend   odoo_mcp  if host_mcp

# ── Backend ───────────────────────────────────────────────────────────────

backend odoo_mcp
    mode        http
    balance     roundrobin

    # Pass real client IP to the container
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Host  %[req.hdr(host)]
    http-request set-header X-Real-IP         %[src]

    # Health check via /healthz
    option      httpchk GET /healthz
    http-check  expect status 200

    server      mcp1 127.0.0.1:8000 check inter 10s rise 2 fall 3
