name: CI

# Pipeline phases:
#   1. build      — compile native ELF + WASM module
#   2. gate       — SBOM, SAST, OPA policy checks (shift-left)
#   3. publish    — sign artefacts, create GitHub Release, push container image
#
# Deployment is SEPARATE — Terraform/quadlets/rc.d pull from signed locations:
#   CF Workers  ← Terraform downloads .wasm from GitHub Release
#   Preprod     ← Quadlet pulls image from GHCR (tagged by release)
#   Prod        ← FreeBSD/NetBSD rc.d downloads ELF from GitHub Release

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  issues:   write

jobs:
  # ── Phase 1: Build ──────────────────────────────────────────────────────
  build-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc make libssl-dev autoconf automake libtool \
            pkg-config zlib1g-dev curl
          git clone --depth=1 https://github.com/kristapsdz/kcgi /tmp/kcgi
          cd /tmp/kcgi && ./configure && make && sudo make install

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Bootstrap nob (native)
        run: cc nob.c -o nob

      - name: Build
        run: ./nob

      - uses: actions/upload-artifact@v4
        with:
          name: odoo-mcp-native
          path: build/odoo-mcp-server


  test:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gcc make
          git clone --depth=1 https://github.com/kristapsdz/kcgi /tmp/kcgi
          cd /tmp/kcgi && ./configure && make && sudo make install

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Build nob driver
        run: gcc -std=c99 -D_POSIX_C_SOURCE=200809L -o nob nob.c

      - name: Run xUnit tests
        run: ./nob test


  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasi-sdk
        run: |
          WASI_VER=24
          curl -sLo /tmp/wasi.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VER}/wasi-sdk-${WASI_VER}.0-x86_64-linux.tar.gz"
          sudo tar xz -C /opt -f /tmp/wasi.tar.gz
          sudo ln -s /opt/wasi-sdk-${WASI_VER}.0 /opt/wasi-sdk

      - name: Vendor nob.h
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Bootstrap nob (wasm)
        run: cc -Dwasm nob.c -o nob

      - name: Build
        run: env WASI_SDK=/opt/wasi-sdk ./nob

      - uses: actions/upload-artifact@v4
        with:
          name: odoo-mcp-wasm
          path: build/odoo-mcp-server.wasm

      - uses: actions/checkout@v4

      - name: Install cdxgen + osv-scanner
        run: |
          npm install -g @cyclonedx/cdxgen
          curl -sLo /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner

      - name: cdxgen CycloneDX
        run: cdxgen -t c -o sbom.cdx.json --spec-version 1.6 .

      - name: cdxgen SPDX
        run: |
          cdxgen -t c --output-format spdx-json \
            -o sbom.spdx.json --spec-version 1.6 . \
          || node scripts/gen_spdx.js

      - name: osv-scanner SARIF
        run: |
          osv-scanner --sbom=sbom.cdx.json --format=sarif \
            --output=osv.sarif.json || true
          python3 scripts/sarif_stub.py osv.sarif.json osv-scanner

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: osv.sarif.json
          category: osv-scanner

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom.cdx.json
            sbom.spdx.json
            osv.sarif.json


  sast-c:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y cppcheck clang

      - name: cppcheck SARIF
        run: |
          cppcheck --enable=all --std=c99 --suppress=missingInclude \
            --inline-suppr --error-exitcode=0 \
            --output-file=cppcheck.xml --xml *.c 2>&1 || true
          python3 scripts/cppcheck_to_sarif.py cppcheck.xml cppcheck.sarif.json

      - name: clang AST call extraction
        run: |
          clang -std=c99 -I. -Xclang -ast-dump=json -fsyntax-only \
            main.c mcp.c odoo.c 2>/dev/null | \
          jq '[.. | select(.kind?=="CallExpr") |
            {callee:(.inner[0].referencedDecl.name? //
                     .inner[0].inner[0].referencedDecl.name?)}
            | select(.callee!=null)]' > ast_calls.json 2>/dev/null \
          || echo '[]' > ast_calls.json

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: cppcheck.sarif.json
          category: cppcheck

      - uses: actions/upload-artifact@v4
        with:
          name: c-sast-artifacts
          path: |
            cppcheck.sarif.json
            ast_calls.json


  containers-gate:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sLo /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Generate containers check JSON
        run: sh scripts/check_containers.sh > containers_check.json

      - name: OPA containers gate
        run: |
          opa eval -d policy/containers.rego -i containers_check.json \
            --fail-defined 'data.odoo_mcp.containers.violations[_]' && \
            echo "containers gate: PASS"


  terraform-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: KICS scan SARIF
        run: |
          docker run --rm \
            -v "$(pwd)/terraform:/path" -v "$(pwd):/output" \
            checkmarx/kics:latest scan -p /path \
              --report-formats sarif --output-path /output \
              --output-name kics-tf --exclude-severities info,low \
              --no-progress || true
          [ -f kics-tf.sarif ] && cp kics-tf.sarif kics-tf.sarif.json || true
          python3 scripts/sarif_stub.py kics-tf.sarif.json kics

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: kics-tf.sarif.json
          category: kics-terraform

      - uses: actions/upload-artifact@v4
        with:
          name: tf-sast-artifacts
          path: kics-tf.sarif.json


  terraform-plan:
    runs-on: ubuntu-latest
    needs: terraform-sast
    environment: plan
    env:
      TF_VAR_cloudflare_api_token:  ${{ secrets.CF_API_TOKEN_PLAN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id:    ${{ secrets.CF_ZONE_ID }}
      TF_VAR_odoo_url:              ${{ secrets.ODOO_URL }}
      TF_VAR_odoo_db:               ${{ secrets.ODOO_DB }}
      TF_VAR_odoo_user:             ${{ secrets.ODOO_USER }}
      TF_VAR_odoo_api_key:          ${{ secrets.ODOO_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: tf init + validate + plan
        working-directory: terraform/
        run: |
          terraform init -backend=false
          terraform validate
          # Stub assets so plan can run without real build outputs
          mkdir -p ../workers && touch ../workers/worker.js
          mkdir -p ../build  && touch ../build/odoo-mcp-server.wasm
          terraform plan -out=plan.tfplan 2>&1 | head -50 || true
          terraform show -json plan.tfplan > plan.json 2>/dev/null || \
            echo '{"resource_changes":[]}' > plan.json

      - name: Install conftest
        run: |
          curl -sLo /tmp/ct.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.57.0/conftest_0.57.0_Linux_x86_64.tar.gz
          sudo tar xz -C /usr/local/bin -f /tmp/ct.tar.gz conftest

      - name: conftest plan gate
        run: |
          conftest test terraform/plan.json \
            --policy policy/ \
            --namespace odoo_mcp.terraform_plan \
            --output table

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tf-plan-json
          path: terraform/plan.json


  opa-gate:
    runs-on: ubuntu-latest
    needs: [test, sast-c, containers-gate, terraform-sast, terraform-plan, sbom]
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sLo /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Validate all Rego policies
        run: opa check policy/

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-artifacts"
          merge-multiple: true

      - name: c_quality gate
        run: |
          opa eval -d policy/c_quality.rego -i cppcheck.sarif.json \
            --fail-defined 'data.odoo_mcp.c_quality.violations[_]' && \
            echo "c_quality: PASS"

      - name: terraform_sast gate
        run: |
          opa eval -d policy/terraform_sast.rego -i kics-tf.sarif.json \
            --fail-defined 'data.odoo_mcp.terraform_sast.violations[_]' && \
            echo "terraform_sast: PASS"

      - name: sarif CVE gate
        run: |
          opa eval -d policy/sarif.rego -i osv.sarif.json \
            --fail-defined 'data.odoo_mcp.sarif.violations[_]' && \
            echo "sarif CVE gate: PASS"


  publish:
    runs-on: ubuntu-latest
    needs: opa-gate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write      # create GitHub Release
      id-token: write      # cosign keyless signing
      packages: write      # push to GHCR
    outputs:
      release_url: ${{ steps.release.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: odoo-mcp-native
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: odoo-mcp-wasm
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sbom-artifacts
          path: dist/

      # Sign the ELF and WASM with cosign keyless (Sigstore)
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artefacts
        run: |
          cosign sign-blob --yes \
            --bundle dist/odoo-mcp-server.bundle \
            dist/odoo-mcp-server
          cosign sign-blob --yes \
            --bundle dist/odoo-mcp-server.wasm.bundle \
            dist/odoo-mcp-server.wasm

      # SHA-256 checksums
      - name: Generate checksums
        run: |
          cd dist
          sha256sum odoo-mcp-server odoo-mcp-server.wasm \
            sbom.cdx.json sbom.spdx.json > SHA256SUMS

      # GitHub Release with all signed artefacts
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/odoo-mcp-server
            dist/odoo-mcp-server.bundle
            dist/odoo-mcp-server.wasm
            dist/odoo-mcp-server.wasm.bundle
            dist/sbom.cdx.json
            dist/sbom.spdx.json
            dist/SHA256SUMS

      # Container image — built from Containerfile, binary copied from dist/
      - name: Vendor nob.h (for Containerfile builder stage)
        run: curl -sLo nob.h https://raw.githubusercontent.com/tsoding/nob.h/main/nob.h

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/denzuko/odoo-mcp-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        id: image-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELEASE_TAG=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the container image digest with cosign keyless
      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/denzuko/odoo-mcp-server@${{ steps.image-push.outputs.digest }}

      - uses: actions/checkout@v4

      - name: Install cosign + wrangler
        run: |
          npm install -g wrangler
          # cosign for verification
          curl -sLo /usr/local/bin/cosign \
            https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x /usr/local/bin/cosign

      - name: Download and verify .wasm from GitHub Release
        run: |
          TAG=${{ github.ref_name }}
          REPO="denzuko/odoo-mcp-server"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          curl -sLo workers/odoo-mcp-server.wasm \
            "${BASE}/odoo-mcp-server.wasm"
          curl -sLo workers/odoo-mcp-server.wasm.bundle \
            "${BASE}/odoo-mcp-server.wasm.bundle"

          cosign verify-blob \
            --bundle workers/odoo-mcp-server.wasm.bundle \
            --certificate-identity "https://github.com/${REPO}/.github/workflows/ci.yml@refs/tags/${TAG}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            workers/odoo-mcp-server.wasm
          echo "wasm signature verified"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Terraform init + apply
        working-directory: terraform/
        run: |
          terraform init
          terraform apply -auto-approve
          terraform output mcp_endpoint

      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deploy
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs:
      - build-native
      - build-wasm
      - docker
      - test
      - sbom
      - sast-c
      - containers-gate
      - terraform-sast
      - terraform-plan
      - opa-gate
    if: failure() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: jayqi/failed-build-issue-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          label-name: "ci"
